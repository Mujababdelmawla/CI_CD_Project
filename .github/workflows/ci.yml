name: CI Pipeline — Task Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Flask Backend CI ─────────────────────────────────────────────────
  backend-ci:
    name: Backend — Install, Test, Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd backend
          pytest -v --cov=app --cov-report=term-missing

      - name: Package backend artifact
        run: |
          mkdir -p artifact/backend
          cp backend/app.py artifact/backend/
          cp backend/requirements.txt artifact/backend/
          echo "Backend packaged successfully"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: artifact/backend/

  # ── Job 2: React Frontend CI ────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Install, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run tests
        run: |
          cd frontend
          npm test

      - name: Build React app
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ── Job 3: CI Summary ───────────────────────────────────────────────────────
  # Runs only if BOTH backend-ci and frontend-ci pass
  ci-success:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [ backend-ci, frontend-ci ]

    steps:
      - name: All checks passed
        run: |
          echo "======================================"
          echo " CI Pipeline passed successfully!"
          echo " Backend tests   passed"
          echo " Frontend tests  passed"
          echo " Artifacts ready for Jenkins CD"
          echo "======================================"