name: CI Pipeline — Task Manager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: Backend CI ────────────────────────────────────────────────────
  backend-ci:
    name: Flask Backend — Install, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd backend
          pytest -v --cov=app --cov-report=term-missing

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend/
          retention-days: 7

  # ── JOB 2: Frontend CI ───────────────────────────────────────────────────
  frontend-ci:
    name: React Frontend — Install, Test, Build
    runs-on: ubuntu-latest
    needs: backend-ci       # only runs if backend-ci passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Fix binary permissions
        run: chmod +x frontend/node_modules/.bin/*

      - name: Run tests
        run: |
          cd frontend
          ./node_modules/.bin/vitest run

      - name: Build React app
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ── JOB 3: Summary ──────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]   # only runs if BOTH pass

    steps:
      - name: Pipeline passed
        run: |
          echo "========================================="
          echo "  CI Pipeline completed successfully!"
          echo "========================================="
          echo "  Backend  : all tests passed"
          echo "  Frontend : all tests passed + built"
          echo "  Artifacts: ready for Jenkins CD"
          echo "========================================="